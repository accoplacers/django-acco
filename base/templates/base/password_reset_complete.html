<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated · Accoplacers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'base/css/ds.css' %}">
  <link rel="icon" href="{% static 'base/img/favicon.ico' %}" type="image/x-icon">
</head>
<body class="portal-body theme-employee">
  <div class="portal-left">
    <div class="portal-left-bg-glow"></div>
    <div class="portal-left-bg"></div>
    <div class="pl-top">
      <a href="{% url 'registration_view' %}" class="nav-logo nav-logo-white portal-logo-space">
        <div class="nav-logo-icon">
          <img src="{% static 'base/img/android-chrome-192x192.png' %}" alt="Accoplacers logo" class="main-logo-img">
        </div>
        <span class="nav-logo-text">Acco<span>placers</span></span>
      </a>
      <h1 class="pl-title">Access Restored</h1>
      <p class="pl-subtitle">Your password has been updated securely.</p>
    </div>
    <div class="pl-footer">&copy; 2025 Accoplacers. Dubai, UAE.</div>
  </div>

  <div class="portal-right">
    <div class="login-form-inner">
      <span class="portal-eyebrow"><i class="fas fa-circle-check"></i> PASSWORD UPDATED</span>
      <h1 class="form-heading">You can sign in now</h1>
      <p class="form-sub">Use your new password to access your Accoplacers account.</p>
      <div class="auth-footer">
        <a href="{% url 'employee_login' %}">Candidate login</a>
        <a href="{% url 'employer_login' %}">Employer login</a>
      </div>
    </div>
  </div>
</body>
</html>
